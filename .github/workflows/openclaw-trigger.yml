name: OpenClaw Auto Trigger

on:
  workflow_dispatch:
  push:
    branches: [main, master, dev, develop]
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, reopened, synchronize, labeled]
  issue_comment:
    types: [created]
  discussion:
    types: [created, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Event Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action || 'N/A' }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          
      - name: Send Telegram Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action || 'manual' }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref }}
          EVENT_URL: ${{ github.event.html_url || github.event.pull_request.html_url || github.event.issue.html_url || github.event.repository.html_url || 'N/A' }}
        run: |
          echo "Event: ${EVENT_NAME}, Action: ${EVENT_ACTION}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT}" \
            -d "text=GitHub: ${EVENT_NAME} by ${ACTOR}" \
            -d "parse_mode=Markdown"
          echo "Done"
