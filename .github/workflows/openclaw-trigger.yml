name: OpenClaw Auto Trigger

on:
  push:
    branches: [main, master, dev, develop]
  issues:
    types: [opened, closed, reopened, labeled]
  pull_request:
    types: [opened, closed, reopened, synchronize, labeled]
  issue_comment:
    types: [created]
  discussion:
    types: [created, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Debug Event Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Actor: ${{ github.actor }}"
          
      - name: Send notification (placeholder)
        run: |
          # 这里可以添加发送到 OpenClaw 的逻辑
          # 例如调用 OpenClaw API 或发送消息
          echo "Sending notification to OpenClaw..."
          echo "Event: ${{ github.event_name }}"
          echo "Repo: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
